<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teste de Login - Basic Auth</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 500px;
            margin: 50px auto;
            padding: 20px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        input {
            width: 100%;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
        }
        button {
            background: #007bff;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            width: 100%;
        }
        button:hover {
            background: #0056b3;
        }
        .result {
            margin-top: 20px;
            padding: 15px;
            border-radius: 4px;
        }
        .success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        .info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }
    </style>
</head>
<body>
    <h1>Teste de Login - Basic Auth</h1>
    
    <div class="form-group">
        <label for="username">Usuário:</label>
        <input type="text" id="username" value="admin">
    </div>
    
    <div class="form-group">
        <label for="password">Senha:</label>
        <input type="password" id="password" value="Ccsouza2026">
    </div>
    
    <button onclick="testarLogin()">Testar Login</button>
    
    <div id="result"></div>

    <script>
        const API_URL = "https://controle-cartao-api.brunos2tammy.workers.dev/state";
        
        function mostrarResultado(mensagem, tipo) {
            const resultDiv = document.getElementById('result');
            resultDiv.className = 'result ' + tipo;
            resultDiv.innerHTML = mensagem;
        }
        
        async function testarLogin() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            
            mostrarResultado('Testando...', 'info');
            
            try {
                // Criar credenciais Basic Auth
                const credentials = btoa(username + ':' + password);
                const authHeader = 'Basic ' + credentials;
                
                console.log('Tentando login...');
                console.log('URL:', API_URL);
                console.log('Auth Header:', authHeader);
                
                const response = await fetch(API_URL, {
                    method: 'GET',
                    headers: {
                        'Authorization': authHeader
                    }
                });
                
                console.log('Status:', response.status);
                
                if (response.ok) {
                    const data = await response.json();
                    console.log('Dados:', data);
                    mostrarResultado(
                        '<strong>✅ LOGIN BEM-SUCEDIDO!</strong><br><br>' +
                        'Status: ' + response.status + '<br>' +
                        'Dados recebidos:<br>' +
                        '<pre>' + JSON.stringify(data, null, 2) + '</pre>',
                        'success'
                    );
                } else {
                    const errorText = await response.text();
                    console.error('Erro:', errorText);
                    mostrarResultado(
                        '<strong>❌ ERRO NO LOGIN</strong><br><br>' +
                        'Status: ' + response.status + '<br>' +
                        'Mensagem: ' + errorText,
                        'error'
                    );
                }
            } catch (error) {
                console.error('Erro na requisição:', error);
                mostrarResultado(
                    '<strong>❌ ERRO DE CONEXÃO</strong><br><br>' +
                    'Erro: ' + error.message + '<br><br>' +
                    'Verifique:<br>' +
                    '1. Se a API está online<br>' +
                    '2. Se há problemas de CORS<br>' +
                    '3. Se sua conexão está funcionando',
                    'error'
                );
            }
        }
        
        // Testar automaticamente ao carregar
        window.onload = function() {
            console.log('Página carregada. Clique no botão para testar.');
        };
    </script>
</body>
</html>
