name = "controle-cartao-api"
main = "src/index.ts"
compatibility_date = "2024-12-01"

# FIREBASE_PROJECT_ID: Console Firebase > Configurações do projeto
# ALLOWED_ORIGIN: URL exata do site no Pages (ex.: https://xxx.pages.dev). Use * só em testes.
# AUTH_USERNAME: Usuário para autenticação Basic Auth
# AUTH_PASSWORD: Senha para autenticação Basic Auth
[vars]
FIREBASE_PROJECT_ID = "controle-de-cartao-47347"
ALLOWED_ORIGIN = "https://controle-de-cartao.pages.dev"
AUTH_USERNAME = "admin"
AUTH_PASSWORD = "Ccsouza2026"

[triggers]
crons = ["0 21 * * *"]

# Segredos (não versionar):
#   npx wrangler secret put FIREBASE_CLIENT_EMAIL
#   npx wrangler secret put FIREBASE_PRIVATE_KEY
# FIREBASE_PRIVATE_KEY: PEM da conta de serviço — prefira: npx wrangler secret put FIREBASE_PRIVATE_KEY --file chave.pem
