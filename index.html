<!DOCTYPE html>
<html lang="pt-br">

<head>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0d6efd">

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Controle de Cartão</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" />
  <link rel="stylesheet" href="styled.css">

  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
  <script src="api-config.js"></script>

</head>

<body>

  <div id="authGate" class="auth-gate position-fixed top-0 start-0 w-100 h-100 d-flex align-items-center justify-content-center p-3 d-none">
    <div class="card shadow-lg border-0" style="max-width:400px;width:100%;">
      <div class="card-body p-4">
        <div class="login-card-machine" aria-hidden="true">
          <div class="login-machine">
            <div class="login-machine-screen"></div>
            <div class="login-machine-slot"></div>
            <div class="login-machine-buttons">
              <span></span>
              <span></span>
              <span></span>
            </div>
          </div>
          <img class="login-card-img login-card-itau" src="Logos/Itau-card.png" alt="">
          <img class="login-card-img login-card-carrefour" src="Logos/Carrefour.png" alt="">
        </div>
        <h5 class="fw-bold mb-2 text-center">Controle de Cartão</h5>
        <p class="text-muted small mb-4 text-center">Acesso restrito. Entre com suas credenciais.</p>
        
        <form id="loginForm" onsubmit="return false;">
          <div class="mb-3">
            <label for="loginUsername" class="form-label">Usuário</label>
            <input type="text" class="form-control" id="loginUsername" required autocomplete="username" value="admin">
          </div>
          
          <div class="mb-3">
            <label for="loginPassword" class="form-label">Senha</label>
            <input type="password" class="form-control" id="loginPassword" required autocomplete="current-password">
          </div>
          
          <button type="submit" id="btnLogin" class="btn btn-primary w-100 rounded-pill mb-2">
            <i class="bi bi-box-arrow-in-right"></i> Entrar
          </button>
        </form>
        
        <p id="authGateErro" class="text-danger small mb-0 text-center d-none"></p>
      </div>
    </div>
  </div>
  
  <!-- Painel de Debug oculto (apenas para console) -->
  <div id="debugPanel" class="d-none"></div>

  <div class="app-header">

    <div class="app-header-main">
      <div class="app-mes-atual">
        <h6 class="m-0 fw-bold">Controle de Cartão</h6>
        <small>Mês Atual</small>
        <strong id="mesAtual"></strong>
      </div>

      <div class="app-config">
        <button type="button" id="btnToggleValores" class="btn btn-sm btn-outline-light btn-toggle-valores" title="Ocultar valores" onclick="alternarValoresOcultos()">
          <i id="iconeToggleValores" class="bi bi-eye"></i>
        </button>
      </div>
    </div>

    <div class="card p-3 border-0 historico-meses-card historico-meses-topo">
      <button type="button" class="historico-meses-header" onclick="toggleMesesTopo()">
        <h6><i class="bi bi-calendar3"></i> Meses</h6>
        <i id="iconeMesesTopo" class="bi bi-chevron-up"></i>
      </button>
      <div id="conteudoMesesTopo" class="historico-meses-conteudo">
        <div class="meses-config">
          <select id="mesFiltro" class="form-select form-select-sm"></select>
          <select id="anoFiltro" class="form-select form-select-sm"></select>
        </div>
        <div id="historicoMeses"></div>
      </div>
    </div>

  </div>

  <!-- CONTEÚDO -->
  <div class="container mt-4">
    <div class="row">

      <!-- FORM -->
      <div class="col-12 col-md-5">
        <div class="bloco-esquerda">
          <div class="card p-3 shadow-sm border-0 form-compras-card menu-card" data-menu-view="lancamentos">

            <button type="button" class="section-toggle" onclick="toggleSecao('secaoAdicionar', 'iconeAdicionar')">
              <h6><i class="bi bi-plus-circle"></i> Adicionar Compras</h6>
              <i id="iconeAdicionar" class="bi bi-chevron-up"></i>
            </button>

            <div id="secaoAdicionar" class="section-content">

              <select id="cartao" class="form-select mb-2">
                <option>Itau</option>
                <option>Carrefour</option>
              </select>

              <select id="tipo" class="form-select mb-2"></select>

              <input id="descricao" class="form-control mb-2" placeholder="Descrição">
              <div class="invalid-feedback">
                Informe a descrição
              </div>

              <input id="valor" class="form-control mb-2" placeholder="Valor" inputmode="decimal" pattern="[0-9,.]*"
                oninput="formatarValor(this)">
              <div class="invalid-feedback">
                Informe o valor
              </div>

              <input id="parcelas" type="number" class="form-control mb-2" placeholder="Parcelas">

              <input id="data" type="date" class="form-control mb-3">

              <div class="d-flex gap-2">

                <button id="btnSalvar" onclick="salvar()" class="btn btn-primary w-100 rounded-pill">
                  <i class="bi bi-plus"></i> Adicionar
                </button>

                <button id="btnCancelar" onclick="cancelarEdicao()" class="btn btn-secondary w-100 rounded-pill d-none">
                  Cancelar
                </button>

              </div>

              <input type="file" id="arquivoExcel" class="d-none" accept=".xlsx" onchange="importarExcel(event)">

              <button type="button" onclick="arquivoExcel.click()"
                class="btn btn-outline-success w-100 rounded-pill mt-2">
                <i class="bi bi-file-earmark-excel"></i> Importar Excel
              </button>

              <button type="button" onclick="deletarComprasDoMes()" class="btn btn-outline-danger w-100 rounded-pill mt-2">
                <i class="bi bi-trash3"></i> Excluir Compras do Mês
              </button>

            </div>

          </div>

        </div>


      </div>

      <!-- DIREITA -->
      <div class="col-12 col-md-7">

        <div class="card p-3 shadow-sm border-0 mb-3 menu-card" data-menu-view="inicio">
          <div class="resumo-cartoes-header">
            <h6 class="m-0"><i class="bi bi-credit-card-2-front"></i> Resumo dos Cartões</h6>
            <button id="btnAtualizarPagina" class="btn btn-outline-secondary btn-atualizar-pagina" onclick="window.location.reload();">
              <i class="bi bi-arrow-clockwise"></i> Atualizar
            </button>
          </div>
          <div class="home-total-grid">
            <div class="home-total-card">
              <small><i class="bi bi-wallet2"></i> Total do Mês</small>
              <strong>R$ <span id="total">0</span></strong>
            </div>
            <div class="home-total-card itau">
              <img class="home-card-bg" src="Logos/Itau-card.png" alt="">
              <div class="home-card-content">
                <small>Itaú</small>
                <strong>R$ <span id="totalItau">0</span></strong>
              </div>
            </div>
            <div class="home-total-card carrefour">
              <img class="home-card-bg" src="Logos/Carrefour.png" alt="">
              <div class="home-card-content">
                <small>Carrefour</small>
                <strong>R$ <span id="totalCarrefour">0</span></strong>
              </div>
            </div>
          </div>
          <div class="inicio-actions">
            <button type="button" id="btnLogout" class="btn btn-outline-danger btn-sair-inicio d-none" title="Sair da conta">
              <i class="bi bi-box-arrow-right"></i> Sair
            </button>
          </div>
        </div>

        <div class="card p-3 shadow-sm border-0 mb-3 menu-card" data-menu-view="lancamentos">
          <button type="button" class="section-toggle" onclick="toggleSecao('secaoLancamentos', 'iconeLancamentos')">
            <h6><i class="bi bi-list-ul"></i> Lançamentos</h6>
            <i id="iconeLancamentos" class="bi bi-chevron-up"></i>
          </button>
          <div id="secaoLancamentos" class="section-content">
            <div class="btn-group w-100 mb-2" role="group" aria-label="Tipo de pesquisa">
              <button id="btnPesquisaLancamento" type="button" class="btn btn-primary" onclick="alternarPesquisaLancamento('lancamento')">
                <i class="bi bi-search"></i> Lançamento
              </button>
              <button id="btnPesquisaCategoria" type="button" class="btn btn-outline-primary" onclick="alternarPesquisaLancamento('categoria')">
                <i class="bi bi-tags"></i> Categoria
              </button>
            </div>
            <input id="buscaLancamento" class="form-control mb-2" placeholder="Pesquisar lançamento" inputmode="search">
            <select id="filtroCategoriaLancamento" class="form-select mb-2 d-none" onchange="filtrarCategoriaLancamento(this.value)">
              <option value="">Todas as categorias</option>
            </select>
            <div class="filtro-cartao" aria-label="Filtrar lançamentos por cartão">
              <button type="button" class="btn btn-primary" data-filtro-cartao="" onclick="filtrarPorCartao('')">
                <i class="bi bi-credit-card-2-front"></i> Todos
              </button>
              <button type="button" class="btn btn-outline-primary" data-filtro-cartao="Itau" onclick="filtrarPorCartao('Itau')">
                <img src="img/itau.png" alt=""> Itaú
              </button>
              <button type="button" class="btn btn-outline-primary" data-filtro-cartao="Carrefour" onclick="filtrarPorCartao('Carrefour')">
                <img src="img/carrefour.png" alt=""> Carrefour
              </button>
            </div>
            <div id="filtroTipoAtivo" class="filtro-ativo d-none"></div>
            <ul id="lista" class="list-group"></ul>
            <div id="totalFiltroCategoria" class="card border-0 bg-warning-subtle mt-3 d-none">
              <div class="p-3">
                <small class="text-muted">Total filtrado</small>
                <h4 class="m-0 text-success">R$ <span id="valorTotalFiltroCategoria">0,00</span></h4>
                <strong id="nomeTotalFiltroCategoria"></strong>
              </div>
            </div>
          </div>
        </div>

        <div class="card p-3 shadow-sm border-0 mb-3 menu-card" data-menu-view="compras">
          <button type="button" class="section-toggle" onclick="toggleSecao('secaoCartoes', 'iconeCartoes')">
            <h6><i class="bi bi-credit-card"></i> Parcelados</h6>
            <i id="iconeCartoes" class="bi bi-chevron-up"></i>
          </button>
          <div id="secaoCartoes" class="section-content">
            <ul id="resumoCartao" class="list-group"></ul>
          </div>
        </div>

        <div class="card p-3 shadow-sm border-0 mb-3 menu-card" data-menu-view="compras">
          <button type="button" class="section-toggle" onclick="toggleSecao('secaoAVista', 'iconeAVista')">
            <h6><i class="bi bi-cash-coin"></i> Compras à Vista</h6>
            <i id="iconeAVista" class="bi bi-chevron-up"></i>
          </button>
          <div id="secaoAVista" class="section-content">
            <ul id="resumoAVista" class="list-group"></ul>
          </div>
        </div>

        <div class="card p-3 shadow-sm border-0 mb-3 menu-card" data-menu-view="controle">
          <button type="button" class="section-toggle" onclick="toggleSecao('secaoCategorias', 'iconeCategorias')">
            <h6><i class="bi bi-pie-chart"></i> Categorias</h6>
            <i id="iconeCategorias" class="bi bi-chevron-up"></i>
          </button>
          <div id="secaoCategorias" class="section-content">
            <ul id="resumoCategoria" class="list-group"></ul>
          </div>
        </div>

        <div class="card p-3 shadow-sm border-0 mb-3 menu-card" data-menu-view="controle">
          <button type="button" class="section-toggle" onclick="toggleSecao('secaoOrcamentos', 'iconeOrcamentos')">
            <h6><i class="bi bi-speedometer2"></i> Orçamentos</h6>
            <i id="iconeOrcamentos" class="bi bi-chevron-up"></i>
          </button>
          <div id="secaoOrcamentos" class="section-content">
            <ul id="resumoOrcamentos" class="list-group"></ul>
          </div>
        </div>

        <div class="card p-3 shadow-sm border-0 mb-3 menu-card" data-menu-view="controle">
          <button type="button" class="section-toggle" onclick="toggleSecao('secaoOrcamentoConfig', 'iconeOrcamentoConfig')">
            <h6><i class="bi bi-speedometer2"></i> Limitador de orçamento</h6>
            <i id="iconeOrcamentoConfig" class="bi bi-chevron-up"></i>
          </button>
          <div id="secaoOrcamentoConfig" class="section-content">
            <select id="orcamentoTipoAlvo" class="form-select mb-2" onchange="atualizarCampoOrcamento()">
              <option value="categoria">Categoria</option>
              <option value="descricao">Descrição</option>
            </select>
            <select id="orcamentoCategoria" class="form-select mb-2"></select>
            <input id="orcamentoDescricao" class="form-control mb-2 d-none" placeholder="Descrição para acompanhar">
            <input id="orcamentoValor" class="form-control mb-2" placeholder="Valor do orçamento" inputmode="decimal" pattern="[0-9,.]*" oninput="formatarValor(this)">
            <button type="button" onclick="salvarOrcamento()" class="btn btn-outline-warning w-100 rounded-pill">
              <i class="bi bi-plus-circle"></i> Salvar orçamento
            </button>
          </div>
        </div>

        <div class="card p-3 shadow-sm border-0 mb-3 menu-card" data-menu-view="fechamento">
          <button type="button" class="section-toggle" onclick="toggleSecao('secaoFechamento', 'iconeFechamento')">
            <h6><i class="bi bi-calendar2-week"></i> Fechamento do cartão</h6>
            <i id="iconeFechamento" class="bi bi-chevron-up"></i>
          </button>
          <div id="secaoFechamento" class="section-content">
            <select id="fechamentoCartao" class="form-select mb-2" onchange="carregarFechamentoAtual()">
              <option>Itau</option>
              <option>Carrefour</option>
            </select>
            <input id="fechamentoDiaInicio" type="number" min="1" max="28" class="form-control mb-2" placeholder="Início da fatura: dia 3">
            <select id="fechamentoEscopo" class="form-select mb-2" onchange="carregarFechamentoAtual()">
              <option value="global">Aplicar em todos os meses</option>
              <option value="mes">Aplicar só ao mês selecionado</option>
            </select>
            <button type="button" onclick="salvarFechamentoCartao()" class="btn btn-outline-primary w-100 rounded-pill">
              <i class="bi bi-check2-circle"></i> Salvar fechamento
            </button>
            <small id="resumoFechamento" class="d-block text-muted mt-2"></small>
          </div>
        </div>
      </div>

    </div>
  </div>

  <script>

    // URL da API - fallback se api-config.js não carregar
    window.CONTROLE_API = Object.assign(
      { base: "https://controle-cartao-api.brunos2tammy.workers.dev" },
      window.CONTROLE_API || {}
    );
    window.FIREBASE_WEB = Object.assign(
      { apiKey: "", authDomain: "", projectId: "" },
      window.FIREBASE_WEB || {}
    );

    let __cloudSyncTimer = null;
    let __appBootstrapped = false;
    let currentAuthCredentials = null;

    function cloudApiConfigured() {
      return !!(window.CONTROLE_API && window.CONTROLE_API.base);
    }

    async function cloudSyncPossible() {
      return cloudApiConfigured() && !!currentAuthCredentials;
    }

    // Debug desabilitado
    function debugLog(msg, tipo = 'info') {
      // Função vazia - debug desabilitado
    }

    async function pullFromCloudIfEnabled() {
      if (!(await cloudSyncPossible())) return;
      try {
        const base = window.CONTROLE_API.base.replace(/\/$/, "");
        const r = await fetch(`${base}/state`, {
          headers: {
            "Authorization": currentAuthCredentials,
            "Accept": "application/json"
          }
        });
        if (!r.ok) throw new Error("HTTP " + r.status);
        const data = await r.json();
        
        // Sempre usar dados da nuvem (sincronização bidirecional)
        if (Array.isArray(data.compras)) {
          localStorage.setItem("compras", JSON.stringify(data.compras));
        }
        if (Array.isArray(data.orcamentos)) {
          localStorage.setItem("orcamentos", JSON.stringify(data.orcamentos));
        }
        if (data.fechamentosCartao && typeof data.fechamentosCartao === "object") {
          localStorage.setItem("fechamentosCartao", JSON.stringify(data.fechamentosCartao));
        }
        if (data.regrasCategoria && typeof data.regrasCategoria === "object") {
          localStorage.setItem("regrasCategoria", JSON.stringify(data.regrasCategoria));
        }
      } catch (e) {
        console.warn("Sincronização (pull):", e);
      }
    }

    function schedulePushToCloud() {
      if (!cloudApiConfigured()) return;
      clearTimeout(__cloudSyncTimer);
      __cloudSyncTimer = setTimeout(function () {
        pushToCloudNow();
      }, 900);
    }

    async function pushToCloudNow() {
      if (!(await cloudSyncPossible())) return;
      const body = {
        compras: JSON.parse(localStorage.getItem("compras") || "[]"),
        orcamentos: JSON.parse(localStorage.getItem("orcamentos") || "[]"),
        regrasCategoria: JSON.parse(localStorage.getItem("regrasCategoria") || "{}"),
        fechamentosCartao: JSON.parse(localStorage.getItem("fechamentosCartao") || "null") || { global: {}, mensal: {} }
      };
      try {
        const base = window.CONTROLE_API.base.replace(/\/$/, "");
        const r = await fetch(`${base}/state`, {
          method: "PUT",
          headers: {
            "Authorization": currentAuthCredentials,
            "Content-Type": "application/json"
          },
          body: JSON.stringify(body)
        });
        if (!r.ok) console.warn("Sincronização (push):", r.status);
      } catch (e) {
        console.warn("Sincronização (push):", e);
      }
    }

    function persistSet(key, jsonString) {
      localStorage.setItem(key, jsonString);
      if (key === "compras" || key === "orcamentos" || key === "fechamentosCartao" || key === "regrasCategoria") schedulePushToCloud();
    }

    // ========== AUTENTICAÇÃO BASIC AUTH ==========
    
    function showAuthGateErro(msg) {
      const el = document.getElementById("authGateErro");
      if (!el) return;
      if (!msg) {
        el.classList.add("d-none");
        el.innerText = "";
      } else {
        el.classList.remove("d-none");
        el.innerText = msg;
      }
    }

    function logoutBasicAuth() {
      debugLog('Fazendo logout');
      currentAuthCredentials = null;
      sessionStorage.removeItem("auth_credentials");
      
      const gate = document.getElementById("authGate");
      if (gate) gate.classList.remove("d-none");
      
      // Limpar formulário
      const usernameInput = document.getElementById("loginUsername");
      const passwordInput = document.getElementById("loginPassword");
      if (usernameInput) usernameInput.value = "admin";
      if (passwordInput) passwordInput.value = "";
    }

    function startAppAfterAuth() {
      if (__appBootstrapped) return;
      __appBootstrapped = true;
      const lo = document.getElementById("btnLogout");
      if (lo) lo.classList.remove("d-none");
      init().catch(function (e) {
        console.error(e);
      });
    }

    function setupAuthGate() {
      debugLog('=== INICIANDO AUTENTICAÇÃO BASIC AUTH ===');
      
      const gate = document.getElementById("authGate");
      const form = document.getElementById("loginForm");
      const btnLogin = document.getElementById("btnLogin");
      const usernameInput = document.getElementById("loginUsername");
      const passwordInput = document.getElementById("loginPassword");
      
      if (!gate || !form || !btnLogin) {
        debugLog('Elementos de autenticação não encontrados!', 'error');
        return;
      }
      
      // Verificar se já está autenticado
      const savedAuth = sessionStorage.getItem("auth_credentials");
      if (savedAuth) {
        debugLog('Credenciais salvas encontradas');
        currentAuthCredentials = savedAuth;
        if (gate) gate.classList.add("d-none");
        startAppAfterAuth();
        return;
      }
      
      // Mostrar tela de login
      debugLog('Mostrando tela de login');
      if (gate) gate.classList.remove("d-none");
      
      // Handler do formulário
      if (form) {
        form.onsubmit = async function(e) {
          e.preventDefault();
          
          const username = usernameInput.value.trim();
          const password = passwordInput.value.trim();
          
          if (!username || !password) {
            showAuthGateErro("Preencha usuário e senha.");
            return;
          }
          
          debugLog('Tentando login com usuário: ' + username);
          
          try {
            showAuthGateErro("");
            btnLogin.disabled = true;
            btnLogin.textContent = "Aguarde...";
            
            // Criar credenciais Basic Auth
            const credentials = btoa(username + ":" + password);
            const authHeader = "Basic " + credentials;
            
            // Testar credenciais fazendo uma requisição à API
            const base = window.CONTROLE_API.base.replace(/\/$/, "");
            const response = await fetch(base + "/state", {
              method: "GET",
              headers: {
                "Authorization": authHeader
              }
            });
            
            if (response.ok) {
              debugLog('Login bem-sucedido', 'success');
              
              // Salvar credenciais
              currentAuthCredentials = authHeader;
              sessionStorage.setItem("auth_credentials", authHeader);
              
              // Esconder tela de login
              if (gate) gate.classList.add("d-none");
              
              // Iniciar app
              startAppAfterAuth();
            } else {
              debugLog('Login falhou: ' + response.status, 'error');
              showAuthGateErro("Usuário ou senha incorretos.");
              btnLogin.disabled = false;
              btnLogin.innerHTML = '<i class="bi bi-box-arrow-in-right"></i> Entrar';
              passwordInput.value = "";
              passwordInput.focus();
            }
          } catch (error) {
            debugLog('Erro no login: ' + error.message, 'error');
            showAuthGateErro("Erro ao conectar. Verifique sua conexão.");
            btnLogin.disabled = false;
            btnLogin.innerHTML = '<i class="bi bi-box-arrow-in-right"></i> Entrar';
          }
        };
      }
      
      // Botão de logout
      const lo = document.getElementById("btnLogout");
      if (lo) {
        lo.onclick = function() {
          logoutBasicAuth();
        };
      }
    }

    function toggleSecao(idSecao, idIcone) {
      const secao = document.getElementById(idSecao);
      const icone = document.getElementById(idIcone);

      secao.classList.toggle("oculto");

      const estaOculta = secao.classList.contains("oculto");

      icone.classList.toggle("bi-chevron-up", !estaOculta);
      icone.classList.toggle("bi-chevron-down", estaOculta);

      localStorage.setItem(idSecao, estaOculta ? "oculto" : "aberto");
    }

    function aplicarEstadoMesesTopo(recolhido) {
      const conteudo = document.getElementById("conteudoMesesTopo");
      const icone = document.getElementById("iconeMesesTopo");

      document.body.classList.toggle("meses-recolhido", recolhido);
      if (conteudo) conteudo.classList.toggle("oculto", recolhido);
      if (icone) {
        icone.classList.toggle("bi-chevron-up", !recolhido);
        icone.classList.toggle("bi-chevron-down", recolhido);
      }
      ajustarEspacoTopo();
    }

    function toggleMesesTopo() {
      const recolhido = !document.body.classList.contains("meses-recolhido");
      aplicarEstadoMesesTopo(recolhido);
      localStorage.setItem("mesesTopo", recolhido ? "oculto" : "aberto");
      setTimeout(ajustarEspacoTopo, 220);
    }

      const configuracao = obterFechamentosCartao();

      const chaveMes = chaveMesReferencia(dataBase.getFullYear(), dataBase.getMonth());
      const mensal = configuracao.mensal?.[chaveMes]?.[cartaoResumo]?.inicio;
      const global = configuracao.global?.[cartaoResumo]?.inicio;
      const inicio = parseInt(mensal ?? global ?? 1, 10);
      return Number.isFinite(inicio) && inicio >= 1 && inicio <= 28 ? inicio : 1;

    function mesCompetenciaCompra(cartao, dataBase) {
      const inicio = obterInicioFatura(cartao, dataBase);
      const competencia = new Date(dataBase.getFullYear(), dataBase.getMonth(), 1);
      const cartaoResumo = nomeCartaoPadronizado(cartao);

      if (cartaoResumo === "Carrefour") {
        if (dataBase.getDate() > inicio) {
          competencia.setMonth(competencia.getMonth() + 1);
        }

        return competencia;
      }

      if (dataBase.getDate() < inicio) {
        competencia.setMonth(competencia.getMonth() - 1);
      }

      return competencia;

    function importarExcel(event) {

      const arquivo = event.target.files[0];
      if (!arquivo) return;

      const leitor = new FileReader();

      leitor.onload = function (e) {

        const dados = new Uint8Array(e.target.result);
        const workbook = XLSX.read(dados, { type: 'array' });

        const nomeAba = workbook.SheetNames[0];
        const planilha = workbook.Sheets[nomeAba];

        const json = XLSX.utils.sheet_to_json(planilha, { range: 1 });

        console.log(json);

        let compras = JSON.parse(localStorage.getItem("compras")) || [];
        const limpezaInicial = removerComprasDuplicadas(compras);
        compras = limpezaInicial.compras;

        let importados = 0;
        let removidosAntes = limpezaInicial.removidos;
        let duplicados = 0;
        const chavesExistentes = new Set(compras.map(chaveCompraImportada));

        json.forEach(linha => {

          const obj = {
            id: Date.now() + Math.random(),
            descricao: linha["DESCRIÇÃO"] || linha["DESCRIÇÃO "] || "",
            tipo: linha["TIPO"] || linha["TIPO "] || "",
            cartao: linha["CARTÃO"] || linha["CARTÃO "] || "",
            parcelas: normalizarParcelas(linha["TOT PARCELAS"] || linha["TOT PARCELAS "]),

            valor: converterValorExcel(linha["VALOR TOTAL"]),

            data: formatarDataExcel(linha["DATA"]) || ""
          };

          console.log(obj);

          const chave = chaveCompraImportada(obj);

          if (chavesExistentes.has(chave)) {
            duplicados++;
            return;
          }

          compras.push(obj);
          chavesExistentes.add(chave);
          importados++;

        });

        persistSet("compras", JSON.stringify(compras));

        avisoApp(
          "Importação concluída",
          `${importados} registros adicionados. ${duplicados} duplicados ignorados. ${removidosAntes} duplicados antigos removidos.`
        );

        mostrar();
      };

      leitor.readAsArrayBuffer(arquivo);
    }

    function formatarDataExcel(data) {

      if (!data) return "";

      // se vier como string, transforma para o formato usado pelo input date
      if (typeof data === "string") return normalizarData(data);

      // se vier como número (Excel)
      const dataConvertida = XLSX.SSF.parse_date_code(data);

      return `${dataConvertida.y}-${String(dataConvertida.m).padStart(2, '0')}-${String(dataConvertida.d).padStart(2, '0')}`;
    }

    function normalizarData(data) {

      const texto = data.toString().trim();

      if (/^\d{4}-\d{2}-\d{2}$/.test(texto)) {
        return texto;
      }

      const partes = texto.split(/[\/\-]/);

      if (partes.length !== 3) return texto;

      let [dia, mes, ano] = partes;

      dia = dia.padStart(2, "0");
      mes = mes.padStart(2, "0");

      if (ano.length === 2) {
        ano = "20" + ano;
      }

      return `${ano}-${mes}-${dia}`;
    }

    function converterValorExcel(valor) {

      if (typeof valor === "number") return valor;
      if (!valor) return 0;

      let texto = valor
        .toString()
        .replace("R$", "")
        .replace(/\s/g, "")
        .trim();

      const temVirgula = texto.includes(",");
      const temPonto = texto.includes(".");

      if (temVirgula && temPonto) {
        texto = texto.replace(/\./g, "").replace(",", ".");
      } else if (temVirgula) {
        texto = texto.replace(",", ".");
      }

      return parseFloat(texto) || 0;
    }

    function normalizarParcelas(valor) {
      const numero = parseInt(valor, 10);
      return Number.isFinite(numero) && numero > 0 ? numero : 1;
    }

    function chaveCompraImportada(compra) {
      return [
        normalizarTexto(compra.descricao),
        normalizarTexto(compra.tipo),
        nomeCartaoPadronizado(compra.cartao),
        normalizarParcelas(compra.parcelas),
        Number(compra.valor || 0).toFixed(2),
        normalizarData(compra.data || "")
      ].join("|");
    }

    function removerComprasDuplicadas(compras) {
      const chaves = new Set();
      const unicas = [];
      let removidos = 0;

      compras.forEach(compra => {
        const chave = chaveCompraImportada(compra);

        if (chaves.has(chave)) {
          removidos++;
          return;
        }

        chaves.add(chave);
        unicas.push(compra);
      });

      return { compras: unicas, removidos };
    }

    function normalizarTexto(texto) {
      return texto
        ?.toString()
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .replace(/[^\p{L}\p{N}\s]/gu, " ")
        .replace(/\s+/g, " ")
        .trim()
        .toLowerCase() || "";
    }

    function obterRegrasCategoria() {
      return JSON.parse(localStorage.getItem("regrasCategoria") || "{}");
    }

    function salvarRegraCategoria(descricao, tipoCompra) {
      const chave = normalizarTexto(descricao);
      const tipoRegra = tipoCompra?.toString().trim();

      if (!chave || !tipoRegra || normalizarTexto(tipoRegra) === "outros") return;

      const regras = obterRegrasCategoria();
      regras[chave] = tipoRegra;
      persistSet("regrasCategoria", JSON.stringify(regras));
    }

    function detectarTipoPorRegras(descricao) {
      const descricaoNormalizada = normalizarTexto(descricao);
      const regras = Object.entries(obterRegrasCategoria())
        .map(([chave, tipoRegra]) => [normalizarTexto(chave), tipoRegra])
        .filter(([chave, tipoRegra]) => chave && tipoRegra && normalizarTexto(tipoRegra) !== "outros")
        .sort((a, b) => b[0].length - a[0].length);
      const regra = regras.find(([chave]) =>
        descricaoNormalizada === chave || descricaoNormalizada.includes(chave) || chave.includes(descricaoNormalizada)
      );

      return regra?.[1] || "";
    }

    }

    function proximaOrdemCompra(compras, dataCompra) {
      const menorOrdem = compras
        .filter(compra => normalizarData(compra.data) === dataCompra)
        .reduce((menor, compra) => Math.min(menor, ordemCompra(compra)), Infinity);

      return Number.isFinite(menorOrdem) ? menorOrdem - 1 : Date.now();
    }

    function mesmaDataCompra(a, b) {

        "app-view-lancamentos",
        "app-view-compras",
        "app-view-controle",
        "app-view-fechamento"
      );
      document.body.classList.add(`app-view-${view}`);

      document.querySelectorAll("[data-menu-view]").forEach(card => {
        card.classList.toggle("d-none", card.dataset.menuView !== view);
      });

      document.querySelectorAll("[data-menu-target]").forEach(botao => {
        botao.classList.toggle("ativo", botao.dataset.menuTarget === view);
      });

      localStorage.setItem("menuAtivo", view);
    }

    // FORMATAR
    function formatarValor(c) {
      let v = c.value.replace(/\D/g, '');
      v = (v / 100).toFixed(2);
      v = v.replace('.', ',');
      v = v.replace(/\B(?=(\d{3})+(?!\d))/g, '.');
      c.value = v;
    }

    // SALVAR
    function salvar() {

      // limpa erros
      descricao.classList.remove("is-invalid");
      valor.classList.remove("is-invalid");

      // valida descrição
      if (descricao.value.trim() === "") {
        descricao.classList.add("is-invalid");
        descricao.focus();
        return;
      }

      // valida valor
      let valorConvertido = valorInput();

      if (valor.value.trim() === "" || valorConvertido <= 0) {
        valor.classList.add("is-invalid");
        valor.focus();
        return;
      }

      let parcelas = parcelasInput();

      let compras = JSON.parse(localStorage.getItem("compras")) || [];

      const obj = {
        id: editandoIndex !== null ? compras[editandoIndex].id : Date.now(),
        descricao: descricao.value,
        tipo: tipo.value,
        cartao: cartao.value,
        valor: valorConvertido,
        parcelas: parcelas,
        data: data.value,
        ordem: editandoIndex !== null && mesmaDataCompra(compras[editandoIndex], { data: data.value })
          ? ordemCompra(compras[editandoIndex])
          : proximaOrdemCompra(compras, normalizarData(data.value))
      };


      if (editandoIndex !== null) {
        compras[editandoIndex] = obj;
        editandoIndex = null;
      } else {
        compras.push(obj);
      }

      salvarRegraCategoria(obj.descricao, obj.tipo);
      persistSet("compras", JSON.stringify(compras));

      cancelarEdicao();
      mostrar();
    }

    // HELPERS
    function valorInput() {
      let v = valor.value.replace(/\./g, "").replace(",", ".");
      return parseFloat(v);
    }

    function parcelasInput() {
      return normalizarParcelas(parcelas.value);
    }

    // CANCELAR
    function cancelarEdicao() {
      editandoIndex = null;
      compraOriginalEdicao = null;
      descricao.value = "";
      valor.value = "";
      parcelas.value = "";
      const _hoje = new Date();
      data.value = `${_hoje.getFullYear()}-${String(_hoje.getMonth() + 1).padStart(2, '0')}-${String(_hoje.getDate()).padStart(2, '0')}`;

      btnCancelar.classList.add("d-none");
      btnSalvar.innerHTML = '<i class="bi bi-plus"></i> Adicionar';
      validarFormulario();
    }

    // EDITAR
    function editar(id) {

      let compras = JSON.parse(localStorage.getItem("compras")) || [];
      let i = compras.findIndex(c => c.id == id);

      let c = compras[i];

      cartao.value = nomeCartaoPadronizado(c.cartao);
      if (c.tipo && ![...tipo.options].some(opcao => opcao.value === c.tipo)) {
        tipo.add(new Option(c.tipo, c.tipo));
      }
      tipo.value = c.tipo || "Outros";
      descricao.value = c.descricao;
      valor.value = c.valor.toLocaleString("pt-BR", { minimumFractionDigits: 2 });
      parcelas.value = c.parcelas;
      data.value = c.data;

      editandoIndex = i;

      btnCancelar.classList.remove("d-none");
      btnSalvar.innerHTML = '<i class="bi bi-check"></i> Atualizar';

      compraOriginalEdicao = dadosFormulario();
      validarFormulario();

      descricao.classList.remove("is-invalid");
      valor.classList.remove("is-invalid");

      irParaAdicionar();
    }

    function dadosFormulario() {
      return {
        cartao: cartao.value,
        tipo: tipo.value,
        descricao: descricao.value.trim(),
        valor: valorInput() || 0,
        parcelas: parcelasInput(),
        data: data.value
      };
    }

    function formularioFoiAlterado() {
      if (editandoIndex === null || !compraOriginalEdicao) return true;

      const atual = dadosFormulario();

      return Object.keys(compraOriginalEdicao).some(campo =>
        compraOriginalEdicao[campo] !== atual[campo]
      );
    }

    function validarFormulario() {
      const formularioValido =
        descricao.value.trim() !== "" &&
        valor.value.trim() !== "" &&
        valorInput() > 0;

      btnSalvar.disabled = !formularioValido || !formularioFoiAlterado();
    }

    function sugerirTipoPelaDescricao() {
      const texto = normalizarTexto(descricao.value);
      const tipoAprendido = detectarTipoPorRegras(descricao.value);

      if (tipoAprendido) {
        tipo.value = tipoAprendido;
        return;
      }

      const regras = [
        { palavras: ["jau", "jaú"], tipo: "Supermercado" },
        { palavras: ["agromil", "agro mil"], tipo: "Gasto Pet" }
      ];

      const regra = regras.find(r =>
        r.palavras.some(palavra => texto.includes(normalizarTexto(palavra)))
      );

      if (regra) {
        tipo.value = regra.tipo;
      }
    }

    function capitalizarPrimeiraPalavraDescricao() {
      const posicaoCursor = descricao.selectionStart;

      descricao.value = descricao.value.replace(/^(\s*)(\p{L})/u, (_, espacos, letra) =>
        espacos + letra.toLocaleUpperCase("pt-BR")
      );

      descricao.setSelectionRange(posicaoCursor, posicaoCursor);
    }

    descricao.addEventListener("input", validarFormulario);
    descricao.addEventListener("input", sugerirTipoPelaDescricao);
    descricao.addEventListener("input", capitalizarPrimeiraPalavraDescricao);
    valor.addEventListener("input", validarFormulario);
    cartao.addEventListener("change", validarFormulario);
    tipo.addEventListener("change", validarFormulario);
    parcelas.addEventListener("input", validarFormulario);
    data.addEventListener("change", validarFormulario);
    buscaLancamento.addEventListener("input", pesquisarLancamentos);

    // DELETE
    async function deletar(id) {
      const confirmado = await abrirModalApp({
        titulo: "Excluir compra",
        mensagem: "Deseja realmente excluir esta compra?",
        confirmarTexto: "Excluir"
      });

      if (!confirmado) return;

      let compras = JSON.parse(localStorage.getItem("compras")) || [];
      compras = compras.filter(c => c.id != id);
      persistSet("compras", JSON.stringify(compras));
      mostrar();
    }

    function moverCompra(id, direcao) {
      const compras = JSON.parse(localStorage.getItem("compras")) || [];
      const compraAtual = compras.find(c => c.id == id);

      if (!compraAtual) return;

      const comprasDoDia = compras
        .filter(compra => mesmaDataCompra(compra, compraAtual))
        .sort((a, b) => ordemCompra(a) - ordemCompra(b));
      const indiceAtual = comprasDoDia.findIndex(compra => compra.id == id);
      const indiceDestino = indiceAtual + direcao;

      if (indiceAtual < 0 || indiceDestino < 0 || indiceDestino >= comprasDoDia.length) return;

      const compraDestino = comprasDoDia[indiceDestino];
      const ordemAtual = ordemCompra(compraAtual);
      const ordemDestino = ordemCompra(compraDestino);

      compraAtual.ordem = ordemDestino;
      compraDestino.ordem = ordemAtual;

      persistSet("compras", JSON.stringify(compras));
      mostrar();
    }

    function adicionarMesesNaData(dataISO, meses) {
      const [ano, mes, dia] = normalizarData(dataISO).split("-").map(Number);
      const destino = new Date(ano, mes - 1 + meses, 1);
      const ultimoDia = new Date(destino.getFullYear(), destino.getMonth() + 1, 0).getDate();
      destino.setDate(Math.min(dia, ultimoDia));

      return `${destino.getFullYear()}-${String(destino.getMonth() + 1).padStart(2, "0")}-${String(destino.getDate()).padStart(2, "0")}`;
    }

    async function multiplicarCompra(id) {
      const compras = JSON.parse(localStorage.getItem("compras")) || [];
      const compraOriginal = compras.find(c => c.id == id);

      if (!compraOriginal) return;

      const resposta = prompt(
        `Repetir "${compraOriginal.descricao}" por quantos meses após o mês original?`,
        "1"
      );

      if (resposta === null) return;

      const quantidadeMeses = parseInt(resposta, 10);

      if (!Number.isFinite(quantidadeMeses) || quantidadeMeses < 1 || quantidadeMeses > 120) {
        await avisoApp("Quantidade inválida", "Informe um número entre 1 e 120 meses.");
        return;
      }

      const confirmar = await abrirModalApp({
        titulo: "Multiplicar compra",
        mensagem: `Serão criadas ${quantidadeMeses} cópias mensais de "${compraOriginal.descricao}", mantendo valor, cartão e categoria. Confirmar?`,
        confirmarTexto: "Multiplicar"
      });

      if (!confirmar) return;

      for (let i = 1; i <= quantidadeMeses; i++) {
        const novaData = adicionarMesesNaData(compraOriginal.data, i);
        const novaCompra = {
          ...compraOriginal,
          id: Date.now() + i,
          data: novaData,
          ordem: proximaOrdemCompra(compras, novaData)
        };

        compras.push(novaCompra);
      }

      persistSet("compras", JSON.stringify(compras));
      mostrar();
      await avisoApp("Compras criadas", `${quantidadeMeses} cópias mensais foram adicionadas.`);
    }

    async function deletarComprasDoMes() {
      let compras = JSON.parse(localStorage.getItem("compras")) || [];
      let mesSelecionado = parseInt(mesFiltro.value);
      let anoSelecionado = parseInt(anoFiltro.value);
      const nomesMeses = ["Janeiro", "Fevereiro", "Março", "Abril", "Maio", "Junho", "Julho", "Agosto", "Setembro", "Outubro", "Novembro", "Dezembro"];

      const comprasDoMes = compras.filter(c => {
        let dataCompra = normalizarData(c.data);
        let partes = dataCompra.split("-");
        let dataOriginal = new Date(partes[0], partes[1] - 1, partes[2]);

        return dataOriginal.getMonth() === mesSelecionado &&
          dataOriginal.getFullYear() === anoSelecionado;
      });

      if (comprasDoMes.length === 0) {
        await avisoApp("Nada para excluir", `Não existem compras cadastradas em ${nomesMeses[mesSelecionado]} / ${anoSelecionado}.`);
        return;
      }

      const confirmar = await abrirModalApp({
        titulo: "Excluir compras do mês",
        mensagem: `Deseja realmente excluir as ${comprasDoMes.length} compras cadastradas em ${nomesMeses[mesSelecionado]} / ${anoSelecionado}?`,
        confirmarTexto: "Excluir"
      });

      if (!confirmar) return;

      const confirmarNovamente = await abrirModalApp({
        titulo: "Confirmar exclusão",
        mensagem: "Essa ação não pode ser desfeita. Confirmar exclusão das compras deste mês?",
        confirmarTexto: "Excluir tudo"
      });

      if (!confirmarNovamente) return;

      compras = compras.filter(c => {
        let dataCompra = normalizarData(c.data);
        let partes = dataCompra.split("-");
        let dataOriginal = new Date(partes[0], partes[1] - 1, partes[2]);

        return dataOriginal.getMonth() !== mesSelecionado ||
          dataOriginal.getFullYear() !== anoSelecionado;
      });

      persistSet("compras", JSON.stringify(compras));
      mostrar();
    }

    function chaveMesAno(ano, mes) {
      return `${ano}-${String(mes + 1).padStart(2, "0")}`;
    }

    function mudarMesSelecionado(delta) {
      let mes = parseInt(mesFiltro.value) + delta;
      let ano = parseInt(anoFiltro.value);

      if (mes < 0) {
        mes = 11;
        ano--;
      }

      if (mes > 11) {
        mes = 0;
        ano++;
      }

      irParaMesHistorico(ano, mes);
      carregarFechamentoAtual();
    }
    function irParaMesHistorico(ano, mes) {
      anoFiltro.value = ano;

      if (![...anoFiltro.options].some(option => option.value === String(ano))) {
        anoFiltro.innerHTML += `<option value="${ano}">${ano}</option>`;
        anoFiltro.value = ano;
      }

      mesFiltro.value = mes;
      mostrar();
    }

    function renderizarHistoricoMeses(compras, mesSelecionado, anoSelecionado, nomesMeses) {
      const historico = document.getElementById("historicoMeses");
      const totaisPorMes = {};

      compras.forEach(c => {
        let dataCompra = normalizarData(c.data);
        let partes = dataCompra.split("-");
        let base = new Date(partes[0], partes[1] - 1, partes[2]);
        let totalParcelas = normalizarParcelas(c.parcelas);
        let valorParcela = Math.round(c.valor / totalParcelas * 100) / 100;
        let competenciaBase = mesCompetenciaCompra(c.cartao, base);

        for (let i = 0; i < totalParcelas; i++) {
          let d = new Date(competenciaBase);
          d.setMonth(competenciaBase.getMonth() + i);

          const chave = chaveMesAno(d.getFullYear(), d.getMonth());
          totaisPorMes[chave] = (totaisPorMes[chave] || 0) + valorParcela;
        }
      });

      const mesesVisiveis = [-1, 0, 1].map(delta => {
        const data = new Date(anoSelecionado, mesSelecionado + delta, 1);
        const ano = data.getFullYear();
        const mes = data.getMonth();
        const chave = chaveMesAno(ano, mes);

        return {
          ano,
          mes,
          valor: totaisPorMes[chave] || 0
        };
      });

      historico.innerHTML = "";
      const grupoMeses = document.createElement("div");
      grupoMeses.className = "historico-meses";

      const botaoAnterior = document.createElement("button");
      botaoAnterior.type = "button";
      botaoAnterior.className = "historico-navegacao";
      botaoAnterior.setAttribute("aria-label", "Mês anterior");
      botaoAnterior.onclick = () => mudarMesSelecionado(-1);
      botaoAnterior.innerHTML = `<i class="bi bi-chevron-left"></i>`;
      grupoMeses.appendChild(botaoAnterior);

      mesesVisiveis.forEach(({ ano, mes, valor }) => {
        let botao = document.createElement("button");
        botao.type = "button";
        botao.className = "historico-mes";

        if (ano === anoSelecionado && mes === mesSelecionado) {
          botao.classList.add("ativo");
        }

        botao.onclick = () => irParaMesHistorico(ano, mes);
        botao.innerHTML = `
          <span>${nomesMeses[mes]}</span>
          <span class="historico-valor">${valor.toLocaleString("pt-BR", { minimumFractionDigits: 2 })}</span>
        `;

        grupoMeses.appendChild(botao);
      });

      const botaoProximo = document.createElement("button");
      botaoProximo.type = "button";
      botaoProximo.className = "historico-navegacao";
      botaoProximo.setAttribute("aria-label", "Próximo mês");
      botaoProximo.onclick = () => mudarMesSelecionado(1);
      botaoProximo.innerHTML = `<i class="bi bi-chevron-right"></i>`;
      grupoMeses.appendChild(botaoProximo);

      historico.appendChild(grupoMeses);
      setTimeout(ajustarEspacoTopo, 0);
    }

    // MOSTRAR
    function mostrar() {

      let compras = JSON.parse(localStorage.getItem("compras")) || [];

      let lista = document.getElementById("lista");
      let totalSpan = document.getElementById("total");
      lista.innerHTML = "";

      let total = 0;
      let totalPorCartaoMes = { Itau: 0, Carrefour: 0 };
      let resumo = {};
      let resumoCartao = {};
      let resumoAVista = {};
      let lancamentos = [];

      mesAtual.innerText = nomesMeses[mes] + " / " + ano;

        for (let i = 0; i < totalParcelas; i++) {
          let d = new Date(competenciaBase);
          d.setMonth(competenciaBase.getMonth() + i);

          if (d.getMonth() == mes && d.getFullYear() == ano) {

            let num = i + 1;

<div>

<div class="text-end">

R$ ${(valorParcela).toLocaleString("pt-BR", { minimumFractionDigits: 2, maximumFractionDigits: 2 })}
</strong><br>

<small>
${totalParcelas === 1

</small><br>

${totalParcelas > 1 ? `

  </small><br>
` : ""}

${num === 1 ? `

            lancamentos.push({

            });

            total += valorParcela;
            const cartaoPadronizadoMes = nomeCartaoPadronizado(c.cartao);

    </button>
  `;

        totalFiltroCategoria.classList.remove("d-none");
        valorTotalFiltroCategoria.innerText = totalFiltro.toLocaleString("pt-BR", { minimumFractionDigits: 2, maximumFractionDigits: 2 });
        nomeTotalFiltroCategoria.innerText = [filtroTipoAtual, filtroCartaoAtual ? nomeCartaoExibicao(filtroCartaoAtual) : ""].filter(Boolean).join(" · ");
      } else {
        filtroTipoAtivo.classList.add("d-none");
        filtroTipoAtivo.innerHTML = "";

        totalFiltroCategoria.classList.add("d-none");
        valorTotalFiltroCategoria.innerText = "0,00";
        nomeTotalFiltroCategoria.innerText = "";
      }

      if (lancamentosVisiveis.length === 0 && (filtroTipoAtual || filtroCartaoAtual || buscaLancamentoAtual)) {
        let li = document.createElement("li");
        li.className = "list-group-item text-muted";
        li.innerText = "Nenhuma compra encontrada.";
        lista.appendChild(li);
      }

      lancamentosVisiveis.forEach(l => {
        if (l.dataTexto !== dataAtualGrupo) {
          dataAtualGrupo = l.dataTexto;

          let separador = document.createElement("div");
          separador.className = "grupo-data";
          const diaSemana = l.data.toLocaleDateString('pt-BR', { weekday: 'long' });
          const diaSemanaCapitalizado = diaSemana.charAt(0).toUpperCase() + diaSemana.slice(1);
          separador.innerText = `${dataAtualGrupo} — ${diaSemanaCapitalizado}`;
          lista.appendChild(separador);
        }

        lista.appendChild(l.elemento);

      });

      totaisVisiveisAtuais = {
        total: total.toLocaleString("pt-BR", { minimumFractionDigits: 2 }),
        itau: totalPorCartaoMes.Itau.toLocaleString("pt-BR", { minimumFractionDigits: 2 }),
        carrefour: totalPorCartaoMes.Carrefour.toLocaleString("pt-BR", { minimumFractionDigits: 2 })
      };
      aplicarVisibilidadeValores();

      resumoCategoria.innerHTML = "";
      resumoOrcamentos.innerHTML = "";

      const categoriasOrdenadas = Object.entries(resumo)
        .filter(([, valor]) => valor > 0)
        .sort((a, b) => b[1] - a[1]);

      const maiorCategoria = categoriasOrdenadas[0]?.[1] || 0;

      const orcamentos = obterOrcamentos();
      orcamentos.forEach(orcamento => {
        let consumido = 0;

        if (orcamento.tipo === "categoria") {
          consumido = resumo[orcamento.alvo] || 0;
        } else {
          consumido = lancamentos.reduce((soma, lancamento) =>
            normalizarTexto(lancamento.descricao).includes(normalizarTexto(orcamento.alvo))
              ? soma + lancamento.valor
              : soma,
            0
          );
        }

        const percentual = orcamento.valor > 0 ? Math.min((consumido / orcamento.valor) * 100, 100) : 0;
        const status = statusOrcamento(consumido, orcamento.valor);
        let li = document.createElement("li");
        li.className = "list-group-item";
        li.innerHTML = `
          <div class="d-flex justify-content-between align-items-start gap-2">
            <div>
              <strong>${orcamento.alvo}</strong>
              <small class="d-block text-muted">${orcamento.tipo === "categoria" ? "Categoria" : "Descrição"} · ${status.texto}</small>
            </div>
            <button type="button" class="btn btn-sm btn-outline-danger rounded-pill" onclick="excluirOrcamento(${orcamento.id})">
              <i class="bi bi-trash"></i>
            </button>
          </div>
          <div class="small mt-2 d-flex justify-content-between">
            <span>R$ ${consumido.toLocaleString("pt-BR", { minimumFractionDigits: 2 })}</span>
            <span>de R$ ${orcamento.valor.toLocaleString("pt-BR", { minimumFractionDigits: 2 })}</span>
          </div>
          <div class="progress mt-2" style="height: 10px;">
            <div class="progress-bar ${status.classe}" style="width: ${percentual}%"></div>
          </div>
        `;
        resumoOrcamentos.appendChild(li);
      });

      categoriasOrdenadas.forEach(([t, valor], index) => {
        const percentual = maiorCategoria > 0 ? (valor / maiorCategoria) * 100 : 0;

        let li = document.createElement("li");
        li.className = "list-group-item categoria-clicavel";
        li.onclick = () => filtrarPorTipoCategoria(t);
        li.innerHTML = `
    <div class="d-flex align-items-center justify-content-between">
      <div>
        <span class="text-muted me-2">${index + 1}º</span>
        <strong>${t}</strong>
      </div>
      <strong class="text-success">R$ ${valor.toLocaleString("pt-BR", { minimumFractionDigits: 2 })}</strong>
    </div>
    <div class="ranking-categoria">
      <div class="ranking-categoria-barra" style="width: ${percentual}%"></div>
    </div>
  `;
        resumoCategoria.appendChild(li);
      });

      let listaCartao = document.getElementById("resumoCartao");
      listaCartao.innerHTML = "";

      adicionarGrupoParcelados(listaCartao, resumoCartao, "Parcela do Mês", "parcelaMes", "grupo-parcelado-mes", "text-secondary");
      adicionarGrupoParcelados(listaCartao, resumoCartao, "Parcelas em Andamento", "andamento", "grupo-parcelado-andamento", "text-success");
      adicionarGrupoParcelados(listaCartao, resumoCartao, "Última Parcela", "ultima", "grupo-parcelado-ultima", "text-warning");

      let listaAVista = document.getElementById("resumoAVista");
      listaAVista.innerHTML = "";

      for (let cartao in resumoAVista) {
        listaAVista.appendChild(criarResumoCartao(cartao, "À vista", resumoAVista[cartao], "text-success"));
      }

    }

    function adicionarGrupoParcelados(lista, resumoCartao, titulo, campo, classeGrupo, classeValor) {
      const cartoes = Object.keys(resumoCartao)
        .filter(cartao => resumoCartao[cartao][campo] > 0)
        .sort((a, b) => a.localeCompare(b, "pt-BR"));

      if (cartoes.length === 0) return;

      let grupo = document.createElement("div");
      grupo.className = `grupo-data ${classeGrupo}`;
      grupo.innerText = titulo;
      lista.appendChild(grupo);

      cartoes.forEach(cartao => {
        lista.appendChild(criarResumoCartao(cartao, "", resumoCartao[cartao][campo], classeValor));
      });
    }

    function criarResumoCartao(cartao, titulo, valor, classeValor) {
      let li = document.createElement("li");
      li.className = "list-group-item d-flex align-items-center justify-content-between";

      const subtitulo = titulo ? `<small class="d-block text-muted">${titulo}</small>` : "";

      li.innerHTML = `
    <div>
      ${getIconeCartao(cartao)}
      <strong>${cartao}</strong>
      ${subtitulo}
    </div>
    <div class="${classeValor} fw-bold">
      R$ ${valor.toLocaleString("pt-BR", { minimumFractionDigits: 2 })}
    </div>
  `;

      return li;
    }

    // INIT
    async function init() {
      await pullFromCloudIfEnabled();

      const categorias = [
        "Farmácia",
        "Supermercado",
        "Carro / Combustivel",
        "Estacionamento",
        "Acadêmico",
        "Pão da Terra",
        "Compra Fora",
        "Gasto Pet",
        "Necessidades Perfumaria",
        "Roupas",
        "Reparo Casa",
        "Academia",
        "Saúde",
        "Compra Online",
        "Outros"
      ];

      // ordena alfabeticamente
      categorias.sort((a, b) => a.localeCompare(b, 'pt-BR'));

      // joga no select
      tipo.innerHTML = categorias.map(c => `<option>${c}</option>`).join("");
      filtroCategoriaLancamento.innerHTML = `<option value="">Todas as categorias</option>` + categorias.map(c => `<option>${c}</option>`).join("");
      orcamentoCategoria.innerHTML = categorias.map(c => `<option>${c}</option>`).join("");
      atualizarCampoOrcamento();

      const meses = ["Janeiro", "Fevereiro", "Março", "Abril", "Maio", "Junho", "Julho", "Agosto", "Setembro", "Outubro", "Novembro", "Dezembro"];
      mesFiltro.innerHTML = meses.map((m, i) => `<option value="${i}">${m}</option>`).join("");

      let anoAtual = new Date().getFullYear();

      for (let i = anoAtual - 1; i <= anoAtual + 2; i++) {
        anoFiltro.innerHTML += `<option value="${i}">${i}</option>`;
      }

      mesFiltro.value = new Date().getMonth();
      anoFiltro.value = anoAtual;

      const _hojeInit = new Date();
      data.value = `${_hojeInit.getFullYear()}-${String(_hojeInit.getMonth() + 1).padStart(2, '0')}-${String(_hojeInit.getDate()).padStart(2, '0')}`;

      mesFiltro.onchange = mostrar;
      anoFiltro.onchange = mostrar;

      restaurarSecoes();
      restaurarMesesTopo();
      mostrarMenu(localStorage.getItem("menuAtivo") || "inicio");
      mostrar();
      setTimeout(ajustarEspacoTopo, 0);
      window.addEventListener("resize", ajustarEspacoTopo);
    }

    setupAuthGate();

    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("./sw.js")
        .then(() => console.log("SW ok"))
        .catch(err => console.log("Erro:", err));
    }

  </script>

  <nav class="bottom-nav" aria-label="Menu principal">
    <button type="button" data-menu-target="inicio" onclick="mostrarMenu('inicio')">
      <i class="bi bi-credit-card-2-front"></i>
      <span>Início</span>
    </button>
    <button type="button" data-menu-target="lancamentos" onclick="mostrarMenu('lancamentos')">
      <i class="bi bi-list-ul"></i>
      <span>Lançamentos</span>
    </button>
    <button type="button" data-menu-target="compras" onclick="mostrarMenu('compras')">
      <i class="bi bi-bag-check"></i>
      <span>Compras</span>
    </button>
    <button type="button" data-menu-target="controle" onclick="mostrarMenu('controle')">
      <i class="bi bi-pie-chart"></i>
      <span>Controle</span>
    </button>
    <button type="button" data-menu-target="fechamento" onclick="mostrarMenu('fechamento')">
      <i class="bi bi-calendar2-week"></i>
      <span>Fechamento</span>
    </button>
  </nav>

  <div id="modalApp" class="modal-app d-none">
    <div class="modal-app-caixa">
      <h6 id="modalTitulo" class="fw-bold mb-2"></h6>
      <p id="modalMensagem" class="text-muted mb-3"></p>
      <div class="d-flex gap-2">
        <button id="modalCancelar" type="button" class="btn btn-outline-secondary w-100 rounded-pill">
          Cancelar
        </button>
        <button id="modalConfirmar" type="button" class="btn btn-danger w-100 rounded-pill">
          Confirmar
        </button>
      </div>
    </div>
  </div>

</body>

</html>
